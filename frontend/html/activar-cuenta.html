<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activar cuenta — SAMI</title>
    <link rel="icon" href="../image/icon-sami.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../css/style-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="mainlogo-login">
            <img src="../image/sami-logo.svg" alt="SAMI Logo" class="login-logo">
        </div>

        <!-- Estado: verificando -->
        <div id="estado-verificando" style="text-align:center; color:#666;">
            <p>Verificando enlace...</p>
        </div>

        <!-- Formulario: establecer contraseña -->
        <form id="form-activar" class="login-form" style="display:none;" novalidate>
            <h2 id="saludo">Activa tu cuenta</h2>
            <p>Establece tu contraseña para comenzar</p>

            <div class="input-group" style="position:relative;">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Nueva contraseña (mín. 8 caracteres)" required minlength="8" />
                <button type="button" id="toggle-pwd" tabindex="-1" style="
                    position:absolute; right:10px; top:50%; transform:translateY(-50%);
                    background:none; border:none; cursor:pointer; color:#888; padding:4px;
                    display:flex; align-items:center;">
                    <span class="material-symbols-rounded" style="font-size:1.2rem;">visibility</span>
                </button>
            </div>
            <div class="input-group" style="position:relative;">
                <i class="fas fa-lock"></i>
                <input type="password" id="password-confirm" placeholder="Confirmar contraseña" required />
                <button type="button" id="toggle-pwd-confirm" tabindex="-1" style="
                    position:absolute; right:10px; top:50%; transform:translateY(-50%);
                    background:none; border:none; cursor:pointer; color:#888; padding:4px;
                    display:flex; align-items:center;">
                    <span class="material-symbols-rounded" style="font-size:1.2rem;">visibility</span>
                </button>
            </div>

            <button type="submit" class="login-btn">Activar cuenta</button>
        </form>

        <!-- Estado: error -->
        <div id="estado-error" style="display:none; text-align:center;">
            <span class="material-symbols-rounded" style="font-size:3rem; color:#e74c3c;">error</span>
            <p id="msg-error" style="color:#e74c3c;">El enlace no es válido o ya expiró.</p>
            <a href="login-Marcacion.html" style="color:#2563eb;">Volver al login</a>
        </div>

        <!-- Estado: éxito -->
        <div id="estado-exito" style="display:none; text-align:center;">
            <span class="material-symbols-rounded" style="font-size:3rem; color:#1a8a4a;">check_circle</span>
            <p style="color:#1a8a4a; font-weight:600;">¡Cuenta activada correctamente!</p>
            <p style="color:#666;">Ya puedes iniciar sesión con tu correo y contraseña.</p>
            <a href="login-Marcacion.html" class="login-btn" style="display:inline-block; margin-top:16px; text-decoration:none;">
                Ir al login
            </a>
        </div>
    </div>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

    <script>
        const params = new URLSearchParams(window.location.search);
        const token  = params.get("token");

        const divVerificando = document.getElementById("estado-verificando");
        const divError       = document.getElementById("estado-error");
        const divExito       = document.getElementById("estado-exito");
        const formActivar    = document.getElementById("form-activar");
        const msgError       = document.getElementById("msg-error");

        // ── Verificar token al cargar ──
        if (!token) {
            divVerificando.style.display = "none";
            msgError.textContent = "No se proporcionó un enlace de activación.";
            divError.style.display = "block";
        } else {
            fetch(`http://127.0.0.1:5000/activar/verificar?token=${token}`)
                .then(r => r.json())
                .then(data => {
                    divVerificando.style.display = "none";
                    if (data.success) {
                        document.getElementById("saludo").textContent = `Hola, ${data.primer_nombre} 👋`;
                        formActivar.style.display = "block";
                    } else {
                        msgError.textContent = data.error;
                        divError.style.display = "block";
                    }
                })
                .catch(() => {
                    divVerificando.style.display = "none";
                    msgError.textContent = "Error al conectar con el servidor.";
                    divError.style.display = "block";
                });
        }

        // ── Enviar formulario ──
        formActivar.addEventListener("submit", e => {
            e.preventDefault();

            const pwd    = document.getElementById("password").value;
            const pwdCon = document.getElementById("password-confirm").value;

            if (pwd.length < 8) {
                alert("La contraseña debe tener al menos 8 caracteres.");
                return;
            }
            if (pwd !== pwdCon) {
                alert("Las contraseñas no coinciden.");
                return;
            }

            fetch("http://127.0.0.1:5000/activar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token, password: pwd })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    formActivar.style.display = "none";
                    divExito.style.display    = "block";
                } else {
                    alert(data.error || "No se pudo activar la cuenta.");
                }
            })
            .catch(() => alert("Error al conectar con el servidor."));
        });

        //para poder ver el ojito
        document.getElementById("toggle-pwd").addEventListener("click", () => {
        const input = document.getElementById("password");
        const icon  = document.querySelector("#toggle-pwd .material-symbols-rounded");
        const esPassword = input.type === "password";
        input.type = esPassword ? "text" : "password";
        icon.textContent = esPassword ? "visibility_off" : "visibility";
    });

        document.getElementById("toggle-pwd-confirm").addEventListener("click", () => {
        const input = document.getElementById("password-confirm");
        const icon  = document.querySelector("#toggle-pwd-confirm .material-symbols-rounded");
        const esPassword = input.type === "password";
        input.type = esPassword ? "text" : "password";
        icon.textContent = esPassword ? "visibility_off" : "visibility";
    });

    </script>
</body>
</html>

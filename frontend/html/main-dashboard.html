<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAMI - Sistema de Marcación</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/dashboard-style1.css" />
    <link rel="stylesheet" href="../css/horarios.css" />
    <link rel="stylesheet" href="../css/addstudent-style.css" />
    <link rel="stylesheet" href="../css/admin-style.css" />
  </head>
  <body>

    <!-- TOP BAR -->
    <header class="top-bar">
      <div class="top-left">
        <a href="#" id="logo-trigger" class="logo-container">
          <img src="../image/sami-logo.svg" alt="SAMI Logo" class="main-logo" />
        </a>
      </div>
      <div class="top-right">
        <div class="user-info">
          <span id="user-name"></span>
          <div class="user-avatar" id="avatar-circle"></div>
        </div>
      </div>
    </header>

    <!-- SIDEBAR: construido dinámicamente por app.js -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <ul class="nav-list primary-nav" id="sidebar-primary-nav">
          <!-- Inyectado por app.js según el rol -->
        </ul>
        <ul class="nav-list secondary-nav">
          <li class="nav-item">
            <a href="WIP.html" class="nav-link">
              <span class="material-symbols-rounded">settings</span>
              <span class="nav-label">Configuración</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link logout" id="logout-btn">
              <span class="material-symbols-rounded">logout</span>
              <span class="nav-label">Cerrar Sesión</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- MAIN: cada vista se inyecta aquí -->
    <main class="main-content" id="main-content">
      <!-- Inyectado por router.js -->
    </main>

    <script src="../javascript/app.js"></script>
    <script src="../javascript/views/horarios.js"></script>
    <script src="../javascript/views/admin.js"></script>
    <script src="../javascript/views/maestro.js"></script>
    <script src="../javascript/views/materias.js"></script>
  </body>
</html>
